name: opencode-diagnostic

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Model to test'
        required: false
        default: 'alibaba-cn/qwen3-coder-plus'
        type: string

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Get opencode version
        id: version
        shell: bash
        run: |
          VERSION=$(curl -sf https://api.github.com/repos/anomalyco/opencode/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
          echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

      - name: Cache opencode
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/.opencode/bin
          key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

      - name: Install opencode
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add opencode to PATH
        shell: bash
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: List available models
        shell: bash
        run: |
          echo "Attempting to list available models..."
          opencode list models || echo "Failed to list models"
          
      - name: Test specific model
        shell: bash
        run: |
          echo "Testing model: ${{ inputs.model_name }}"
          echo "Environment variables:"
          env | grep -E "(MODEL|ZHIPU|OPENCODE)" || echo "No relevant env vars found"
          
          # Try to run opencode with verbose output
          OPENCODE_LOG_LEVEL=debug opencode github run
        env:
          MODEL: ${{ inputs.model_name }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          DEBUG: true
          OPENCODE_LOG_LEVEL: debug