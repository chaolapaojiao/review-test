name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR 编号（手动触发时必填）'
        required: true
        type: number

concurrency:
  group: opencode-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Fetch latest PR head (运行时获取，确保审查最新提交)
        id: fetch-pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || context.payload.inputs?.pr_number;
            if (!prNumber) {
              core.setFailed('无法获取 PR 编号');
              return;
            }
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(prNumber)
            });
            const headSha = pr.data.head.sha;
            core.setOutput('head_sha', headSha);
            console.log('审查 PR 最新提交:', headSha);

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.fetch-pr.outputs.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Run OpenCode for PR Review
        uses: anomalyco/opencode/github@latest
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: alibaba-cn/qwen3-coder-plus
          use_github_token: true
          prompt: |
            # uni-app 项目 Code Review 审查规范

            参考文档：https://uniapp.dcloud.net.cn/

            **本次审查的 PR 最新提交**：${{ steps.fetch-pr.outputs.head_sha }}
            **运行 ID**：${{ github.run_id }}
            **重要**：本次必须基于上述最新提交的**完整 diff** 进行全新审查，不得复用或参考任何之前的审查结果。

            **项目背景**：本项目使用 uni-app（Vue 2），**仅运行在 Android 和 iOS**，**不需要国际化支持**。审查范围：仅审查变更的代码行。

            **排除项**：不要检查或建议「硬编码文本需国际化」相关问题，本项目不需要 i18n。

            你是一名熟悉 uni-app 的资深代码审查员。每个问题必须附带**具体代码片段**和**修改后的示例代码**。

            ---

            ## 1. 变更概述

            | 项目 | 内容 |
            |------|------|
            | 变更目的 | 一句话概括 |
            | 变更范围 | 修改的文件路径 |
            | 复杂度/风险 | 低/中/高 |

            ---

            ## 2. uni-app 规范审查（重点）

            ### 2.1 组件与语法（参考 uni-app 组件规范）
            - 是否使用 uni-app 基础组件：view、text、image、scroll-view、button、navigator 等，**禁止使用 div、span、img 等 HTML 标签**
            - 组件与属性名是否小写、连字符连接（如 `scroll-view`、`hover-start-time`）
            - 事件绑定是否使用 Vue 语法 `@click`、`@change`（非 bindtap）
            - 样式单位是否优先使用 **rpx**（响应式），避免 px

            ### 2.2 API 与平台
            - 是否使用 uni API：uni.navigateTo、uni.request、uni.getStorageSync 等（非 wx.、my. 等）
            - **逻辑层禁止使用** window、document、navigator、localStorage 等浏览器 API（App 端逻辑层与视图层分离）
            - 平台特定代码是否使用条件编译：`#ifdef APP-PLUS`、`#ifdef APP-ANDROID`、`#ifdef APP-IOS`
            - 是否误用 H5 或小程序专有 API（本项目仅 Android/iOS）

            ### 2.3 页面与路由
            - **pages.json**：新增页面是否已注册、path 格式是否正确、style 配置是否合理
            - 页面跳转是否使用 uni.navigateTo / uni.redirectTo / uni.reLaunch
            - 页面栈管理是否合理（避免栈溢出）

            ### 2.4 生命周期
            - 页面：onLoad、onShow、onReady、onHide、onUnload 使用是否正确
            - App.vue：onLaunch、onShow、onHide 是否包含耗时操作（应避免阻塞启动）

            **输出**：逐项说明，无问题写「✓ 通过」，有问题附代码片段和修改建议。

            ---

            ## 3. 移动端性能审查（参考 uni-app 性能优化专题）

            ### 3.1 图片与渲染
            - 是否避免大图、多张大图同屏（易导致白屏崩溃）
            - 是否避免大体积 base64
            - 是否减少一次性渲染节点数量（建议分批加载）

            ### 3.2 数据更新
            - 非视图所需变量是否定义在 data 外（避免不必要的视图层通信）
            - 长列表是否分批加载、分页

            ### 3.3 长列表与滚动
            - 长列表是否使用 scroll-view 或页面滚动，避免性能问题
            - 是否避免 scroll-view 的 scroll 事件频繁触发逻辑层通信
            - 是否避免 onPageScroll 中执行耗时逻辑

            ### 3.4 通信与动画
            - 是否多使用 CSS 动画，少用 js 定时器做动画
            - 是否减少组件嵌套层级、减少节点数量

            **输出**：逐项说明，无问题写「✓ 通过」。

            ---

            ## 4. 正确性与健壮性

            - 边界条件、空值、类型安全
            - uni.request、Promise 等异步是否正确处理
            - 错误处理、异常捕获

            **输出**：有问题必须标注「文件:行号」并给出修改示例代码。

            ---

            ## 4.5 JavaScript 规范审查

            ### 变量与类型
            - 变量声明：优先使用 const/let，避免 var；禁止隐式全局变量（未声明直接赋值）
            - 相等比较：使用 `===`、`!==`，避免 `==`、`!=`
            - 空值检查：null、undefined、空字符串、空数组、0 等边界是否正确处理

            ### 异步与资源
            - Promise/async：是否正确处理 reject、是否有未捕获的异常
            - 定时器：setTimeout、setInterval 是否在 onUnload/onHide 中清理，避免内存泄漏
            - 事件监听：addEventListener 是否有对应的 removeEventListener

            ### 数组与对象
            - 避免直接修改传入的参数或 props
            - 数组操作：filter、map、find 等是否使用恰当，避免副作用

            ### 其他
            - 是否残留 console.log、debugger 等调试代码
            - 是否使用已废弃的 API 或写法

            **输出**：逐项说明，无问题写「✓ 通过」，有问题附代码片段和修改建议。

            ---

            ## 5. 安全与配置

            - 用户输入验证、敏感信息存储
            - **manifest.json** 权限是否合理、是否申请不必要权限
            - **pages.json** 配置是否正确

            ---

            ## 6. 代码质量

            - 可读性、可维护性、DRY 原则、代码风格

            ---

            ## 7. 问题清单

            | 序号 | 严重程度 | 文件:行号 | 问题描述 | 问题代码 | 修改建议 |
            |------|----------|-----------|----------|----------|----------|
            | 1 | 高/中/低 | xxx.vue:42 | ... | ```...``` | ```...``` |

            严重程度：**高**=崩溃/安全；**中**=Bug/性能；**低**=改进建议。

            ---

            ## 8. 总结

            - 是否建议合并：是/否
            - 必须修复数量：
            - 可选优化数量：