name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Debug Model Information
        run: |
          echo "Using model: zhipuai-coding-plan/glm-4.6"
          echo "Available environment variables:"
          env | grep -E "(MODEL|ZHIPU|OPENCODE)" || echo "No relevant env vars found"
          
      - name: Run OpenCode for PR Review
        uses: anomalyco/opencode/github@latest
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          DEBUG: true
          OPENCODE_LOG_LEVEL: debug
        with:
          model: zhipuai-coding-plan/glm-4.6
          prompt: |
            请审查这个Pull Request，重点关注以下方面：
            - 代码质量和可读性
            - 潜在的bug或逻辑错误
            - 性能问题
            - 安全考虑
            - 代码风格一致性
            - 是否符合项目最佳实践
            
            请提供具体的改进建议，并在必要时指出需要修改的具体代码位置。