name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      github.event_name == 'issue_comment' && github.event.issue.pull_request != null && (
        contains(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, '/opencode')
      ) || github.event_name == 'pull_request_review_comment' && (
        contains(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, '/opencode')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      checks: write
    steps:
      - name: Get PR head ref
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number
            });
            core.setOutput('head_sha', pr.data.head.sha);

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || steps.get-pr.outputs.head_sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: alibaba-cn/qwen3-coder-plus
          use_github_token: true
          prompt: |
            # uni-app 项目 Code Review 审查规范

            ## 项目背景
            本项目使用 **uni-app**（https://uniapp.dcloud.net.cn/）开发，基于 **Vue 3**，**仅运行在 Android 和 iOS** 平台。请结合 uni-app 规范与移动端特性进行审查。

            ---

            你是一名熟悉 uni-app 的资深代码审查员。请**严格按照**以下格式对本次 PR 进行审查。
            **审查范围**：仅审查本次 PR 中变更的代码行，无需审查未修改的代码；不得遗漏任何修改的文件或代码行。
            **重要**：每个问题必须在评论中附带**具体代码片段**（用 ``` 代码块包裹），修改建议必须提供**修改后的示例代码**。

            ---

            ## 1. 变更概述

            | 项目 | 内容 |
            |------|------|
            | 变更目的 | （一句话概括本次修改要解决的问题或实现的功能） |
            | 变更范围 | （列出所有修改的文件路径） |
            | 复杂度评估 | 低/中/高 |
            | 风险等级 | 低/中/高 |

            ---

            ## 2. uni-app 规范审查（重点）

            ### 2.1 组件与语法
            - 是否使用 uni-app 内置组件（view、text、image、scroll-view 等）而非 HTML 标签（div、span、img）
            - 样式单位是否优先使用 **rpx**（响应式单位）而非 px
            - Vue 3 语法是否正确（Composition API / Options API 使用是否规范）

            ### 2.2 页面与路由
            - **pages.json**：新增页面是否已注册、path 是否正确、style 配置是否合理
            - 页面跳转是否使用 uni.navigateTo / uni.redirectTo / uni.reLaunch 等 uni API
            - 页面栈管理是否合理（避免栈溢出）

            ### 2.3 生命周期
            - 是否正确使用 onLoad、onShow、onReady、onHide、onUnload
            - App.vue 的 onLaunch、onShow、onHide 是否有不当逻辑

            ### 2.4 条件编译
            - 平台特定代码是否使用 #ifdef APP-PLUS / #ifdef APP-ANDROID / #ifdef APP-IOS
            - 是否误用了 H5 或小程序相关 API（本项目仅 Android/iOS）

            **输出要求**：逐项说明，无问题则写「✓ 通过」，有问题则写明具体位置并**附带问题代码片段**和修改建议代码。

            ---

            ## 3. 代码质量

            ### 3.1 可读性与可维护性
            - 命名规范、代码结构、注释文档
            - 是否存在重复代码，是否违反 DRY 原则

            ### 3.2 代码风格
            - 是否符合项目既有风格，缩进与格式是否一致

            **输出要求**：逐项说明，无问题则写「✓ 通过」。

            ---

            ## 4. 正确性与健壮性

            ### 4.1 潜在 Bug
            - 边界条件、空值处理、类型安全
            - 异步操作（uni.request、Promise）是否正确处理

            ### 4.2 错误处理
            - uni API 调用失败是否有 try-catch 或错误回调
            - 网络请求、存储读写是否有异常处理

            **输出要求**：逐项说明，无问题则写「✓ 通过」，有问题必须标注「文件:行号」并给出**修改后的示例代码**。

            ---

            ## 5. 移动端性能与安全（重点）

            ### 5.1 性能
            - **长列表**：是否使用 scroll-view、虚拟列表或分页，避免一次性渲染大量数据
            - **图片**：是否控制尺寸、是否懒加载、大图是否压缩
            - **内存**：定时器、监听器是否在 onUnload 中正确清理
            - **启动**：App.vue onLaunch 是否包含耗时操作

            ### 5.2 安全
            - 用户输入是否验证，是否存在 XSS/注入风险
            - 敏感信息是否硬编码，存储是否使用加密
            - **manifest.json** 权限申请是否合理，是否申请了不必要的权限

            **输出要求**：逐项说明，无问题则写「✓ 通过」，有问题需附带代码片段和修改示例。

            ---

            ## 6. manifest.json / pages.json 配置审查

            - **manifest.json**：版本号、权限、app-plus 配置是否合理
            - **pages.json**：路由、globalStyle、tabBar 等配置是否正确

            **输出要求**：若修改了配置文件，必须审查；无修改则写「未涉及」。

            ---

            ## 7. 架构与设计

            - 模块划分、扩展性、与现有架构的一致性

            **输出要求**：逐项说明，无问题则写「✓ 通过」。

            ---

            ## 8. 问题清单与建议

            按以下格式列出**所有**发现的问题（无问题则写「未发现问题」）。**每个问题必须包含**：① 问题代码片段 ② 修改后的示例代码。

            | 序号 | 严重程度 | 文件:行号 | 问题描述 | 问题代码片段 | 修改建议代码 |
            |------|----------|-----------|----------|--------------|--------------|
            | 1 | 高/中/低 | xxx.vue:42 | ... | ```...``` | ```...``` |

            严重程度定义：**高**=可能导致崩溃或安全漏洞；**中**=可能引发 Bug 或性能问题；**低**=代码质量改进建议。

            ---

            ## 9. 总结

            - 是否建议合并：是/否
            - 合并前必须修复的问题数量：
            - 可选优化建议数量：