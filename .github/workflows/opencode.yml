name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      github.event_name == 'issue_comment' && github.event.issue.pull_request != null && (
        contains(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, '/opencode')
      ) || github.event_name == 'pull_request_review_comment' && (
        contains(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, '/opencode')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      checks: write
    steps:
      - name: Get PR head ref
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number
            });
            core.setOutput('head_sha', pr.data.head.sha);

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || steps.get-pr.outputs.head_sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: alibaba-cn/qwen3-coder-plus
          use_github_token: true
          prompt: |
            # Code Review 审查规范

            你是一名资深代码审查员。请**严格按照**以下格式对本次 PR 的**所有变更代码**进行审查，不得遗漏任何修改的文件或代码行。
            **重要**：每个问题必须在评论中附带**具体代码片段**（用 ``` 代码块包裹），修改建议必须提供**修改后的示例代码**。

            ---

            ## 1. 变更概述

            | 项目 | 内容 |
            |------|------|
            | 变更目的 | （一句话概括本次修改要解决的问题或实现的功能） |
            | 变更范围 | （列出所有修改的文件路径） |
            | 复杂度评估 | 低/中/高 |
            | 风险等级 | 低/中/高 |

            ---

            ## 2. 代码质量

            ### 2.1 可读性
            - 命名规范：变量、函数、类名是否语义清晰、符合约定
            - 代码结构：逻辑是否分层清晰、是否易于理解
            - 注释文档：关键逻辑是否有必要注释

            ### 2.2 可维护性
            - 代码复用：是否存在重复代码，是否违反 DRY 原则
            - 职责划分：单一职责是否合理
            - 依赖关系：模块间耦合是否合理

            ### 2.3 代码风格
            - 是否符合项目既有风格
            - 缩进、括号、换行等格式是否一致

            **输出要求**：逐项说明，无问题则写「✓ 通过」，有问题则写明具体位置并**附带问题代码片段**和修改建议代码。

            ---

            ## 3. 正确性与健壮性

            ### 3.1 潜在 Bug
            - 边界条件：空值、空数组、零、负数等是否处理
            - 类型安全：类型转换、类型检查是否正确
            - 并发/异步：是否存在竞态、未处理的 Promise

            ### 3.2 逻辑正确性
            - 业务逻辑是否符合需求
            - 算法实现是否正确

            ### 3.3 错误处理
            - 异常是否被正确捕获和处理
            - 错误信息是否有助于排查

            **输出要求**：逐项说明，无问题则写「✓ 通过」，有问题必须标注「文件:行号」、**粘贴问题代码片段**并给出**修改后的示例代码**。

            ---

            ## 4. 性能与安全

            ### 4.1 性能
            - 是否存在明显性能问题（循环嵌套、重复计算、内存泄漏等）
            - 大数据量或高频调用场景是否考虑

            ### 4.2 安全
            - 用户输入是否经过验证和转义
            - 是否存在敏感信息泄露风险
            - 权限校验是否完整

            **输出要求**：逐项说明，无问题则写「✓ 通过」，有问题需附带代码片段和修改示例。

            ---

            ## 5. 架构与设计

            - SOLID 原则：是否符合
            - 扩展性：后续变更是否易于扩展
            - 与现有架构的一致性

            **输出要求**：逐项说明，无问题则写「✓ 通过」。

            ---

            ## 6. 测试与回归

            - 修改部分是否有对应测试
            - 边界情况是否覆盖
            - 是否可能影响现有功能

            **输出要求**：逐项说明，无测试则写「建议补充」，无问题则写「✓ 通过」。

            ---

            ## 7. 问题清单与建议

            按以下格式列出**所有**发现的问题（无问题则写「未发现问题」）。**每个问题必须包含**：① 问题代码片段 ② 修改后的示例代码。

            | 序号 | 严重程度 | 文件:行号 | 问题描述 | 问题代码片段 | 修改建议代码 |
            |------|----------|-----------|----------|--------------|--------------|
            | 1 | 高/中/低 | xxx.ts:42 | ... | ```...``` | ```...``` |

            严重程度定义：**高**=可能导致崩溃或安全漏洞；**中**=可能引发 Bug 或性能问题；**低**=代码质量改进建议。

            ---

            ## 8. 总结

            - 是否建议合并：是/否
            - 合并前必须修复的问题数量：
            - 可选优化建议数量：