name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      github.event_name == 'issue_comment' && github.event.issue.pull_request != null && (
        contains(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, '/opencode')
      ) || github.event_name == 'pull_request_review_comment' && (
        contains(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, '/opencode')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      checks: write
    steps:
      - name: Get PR head ref
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number
            });
            core.setOutput('head_sha', pr.data.head.sha);

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || steps.get-pr.outputs.head_sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: alibaba-cn/qwen3-coder-plus
          use_github_token: true
          prompt: |
            # uni-app 项目 Code Review 审查规范

            参考文档：https://uniapp.dcloud.net.cn/

            **项目背景**：本项目使用 uni-app（Vue 2），**仅运行在 Android 和 iOS**，**不需要国际化支持**。审查范围：仅审查变更的代码行。

            **排除项**：不要检查或建议「硬编码文本需国际化」相关问题，本项目不需要 i18n。

            你是一名熟悉 uni-app 的资深代码审查员。每个问题必须附带**具体代码片段**和**修改后的示例代码**。

            按以下模块审查：1.变更概述 2.uni-app规范（组件view/text/image、rpx、uni API、条件编译#ifdef APP-PLUS、pages.json、禁止window/document） 3.移动端性能（避免大图、分批加载、scroll/onPageScroll、CSS动画） 4.正确性与健壮性 5.安全与manifest 6.代码质量 7.问题清单（含代码和修改建议） 8.总结