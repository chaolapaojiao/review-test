name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        with:
          model: alibaba-cn/kimi-k2.5
          prompt: |
            请对这个代码进行全面审查，**只关注修改的代码部分**，按以下结构进行分析：
            
            ## 📋 代码变更概述
            - 简要总结本次修改的主要内容和目的
            - 评估变更范围和复杂度
            
            ## 🔍 代码质量审查
            - **可读性**：代码是否清晰易懂，变量/函数命名是否合理
            - **可维护性**：代码结构是否良好，是否遵循设计模式
            - **代码风格**：是否符合项目编码规范和最佳实践
            
            ## 🐛 错误与逻辑审查
            - **潜在Bug**：边界条件、空指针、类型错误、并发问题
            - **逻辑错误**：算法实现、业务逻辑是否正确
            - **错误处理**：异常捕获和错误恢复机制是否完善
            
            ## ⚡ 性能与安全审查
            - **性能问题**：时间复杂度、空间复杂度、资源泄漏
            - **安全漏洞**：输入验证、权限控制、敏感信息泄露
            - **依赖安全**：第三方库版本是否存在已知漏洞
            
            ## 🔧 架构与设计审查
            - **设计原则**：是否符合SOLID原则、DRY原则
            - **模块化**：代码耦合度、内聚性是否合理
            - **扩展性**：是否便于后续功能扩展
            
            ## 🧪 测试覆盖审查
            - **测试完整性**：是否为修改部分添加了足够的测试
            - **边界测试**：是否覆盖了各种边界情况
            - **回归测试**：是否确保现有功能不受影响
            
            ## 📝 具体修改建议
            请针对每个问题提供：
            1. 问题描述和影响
            2. 具体代码位置（文件:行号）
            3. 详细的修改建议
            4. 示例代码（如适用）
            
            **重要**：请确保审查覆盖所有修改的文件和代码行，不要遗漏任何变更。